<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어버이날 사랑의 쿠폰북</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root {
            --bg-color: #fcf1f1;
            --coupon-red: #ff6b6b;
            --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: 'Apple SD Gothic Neo', sans-serif; }
        #app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .instruction { position: absolute; top: 8%; color: #999; font-size: 0.85rem; text-align: center; line-height: 1.6; z-index: 100; }
        .coupon-stack { position: relative; width: 300px; height: 460px; perspective: 1200px; }
        .coupon-card { position: absolute; width: 100%; height: 100%; background: white; border-radius: 18px; border: 1px solid rgba(0, 0, 0, 0.1); box-shadow: var(--card-shadow); display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; touch-action: none; }
        .coupon-stub { height: 90px; background: var(--coupon-red); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 16px 16px 0 0; font-weight: 800; font-size: 0.85rem; letter-spacing: 1px; }
        .perforation { height: 2px; border-top: 3px dashed #eee; margin: 0 12px; position: relative; z-index: 5; }
        .coupon-body { flex: 1; background: white; border-radius: 0 0 16px 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; transform-origin: top center; background-image: radial-gradient(#fff 70%, #fefefe 100%); }
        .coupon-title { font-size: 1.9rem; font-weight: 900; color: #222; text-align: center; padding: 0 10px; }
        .coupon-desc { font-size: 0.8rem; color: #ff8e8e; margin-top: 15px; font-weight: 600; }
        
        .send-to-back { animation: sendBack 0.7s ease-in-out forwards; }
        @keyframes sendBack {
            0% { transform: translateY(0) scale(1) rotate(0); z-index: 50; }
            45% { transform: translateY(-125%) scale(0.9) rotate(-7deg); z-index: 50; }
            55% { z-index: 1; }
            100% { transform: translateY(8px) scale(0.9) rotate(0); z-index: 1; }
        }
        .empty-msg { text-align: center; color: #333; padding: 20px; }
        .final-heart { font-size: 4rem; margin-bottom: 10px; display: block; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="app">
    <div class="instruction">
        <b>위로 밀면</b> 다음 쿠폰<br><b>아래로 당기면</b> 쿠폰 사용
    </div>
    <div class="coupon-stack" id="couponStack"></div>
</div>

<script>
    // 1. 새로운 저장소 키 (이전 오류 데이터 완전 격리)
    const KEY = 'COUPON_FINAL_FIXED_REAL';
    
    const initialSettings = [
        { title: "빨래 널기", count: 2 },
        { title: "빨래 개기", count: 2 },
        { title: "분리 수거", count: 5 },
        { title: "뽀뽀 산책", count: 3 },
        { title: "안마 5분", count: 6 }
    ];

    let allCoupons = [];

    // 셔플 함수
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 초기 로드
    function init() {
        const saved = localStorage.getItem(KEY);
        
        if (saved) {
            allCoupons = JSON.parse(saved);
        } else {
            // 최초 생성
            let temp = [];
            initialSettings.forEach((item, idx) => {
                for(let i=0; i<item.count; i++) {
                    temp.push({
                        uid: `id-${idx}-${i}-${Math.random().toString(36).substr(2, 5)}`,
                        title: item.title,
                        used: false
                    });
                }
            });
            allCoupons = shuffle(temp);
            save();
        }
        render();
    }

    // 로컬스토리지에 현재 상태 저장
    function save() {
        localStorage.setItem(KEY, JSON.stringify(allCoupons));
    }

    function render() {
        const stack = document.getElementById('couponStack');
        stack.innerHTML = '';
        
        // **중요: 사용 안 한 쿠폰만 골라내기**
        const activeList = allCoupons.filter(c => c.used === false);

        if (activeList.length === 0) {
            stack.innerHTML = `
                <div class="empty-msg">
                    <span class="final-heart">❤️</span>
                    <h2>효도 대성공!</h2>
                    <p>모든 쿠폰을 사용하셨습니다.<br>사랑해요 엄마 아빠!</p>
                </div>`;
            return;
        }

        // 최대 5장 표시
        activeList.slice(0, 5).forEach((coupon, index) => {
            const card = document.createElement('div');
            card.className = 'coupon-card';
            card.style.zIndex = 100 - index;
            card.style.transform = `translateY(${index * 8}px) scale(${1 - index * 0.04})`;

            card.innerHTML = `
                <div class="coupon-stub"><span>PARENT'S DAY</span><span>SPECIAL GIFT</span></div>
                <div class="perforation"></div>
                <div class="coupon-body">
                    <div class="coupon-title">${coupon.title}</div>
                    <div class="coupon-desc">▼ 아래로 찢어서 사용</div>
                </div>
            `;
            stack.appendChild(card);
            
            if (index === 0) bindSwipe(card, coupon);
        });
    }

    function bindSwipe(card, coupon) {
        const h = new Hammer.Manager(card);
        h.add(new Hammer.Pan({ direction: Hammer.DIRECTION_ALL, threshold: 0 }));
        const body = card.querySelector('.coupon-body');
        let locked = false;

        h.on('panmove', (e) => {
            if (locked) return;
            if (e.deltaY > 0) {
                body.style.transform = `translateY(${e.deltaY}px) rotate(${e.deltaX * 0.1}deg)`;
            } else {
                card.style.transform = `translateY(${e.deltaY}px) scale(1.03)`;
            }
        });

        h.on('panend', (e) => {
            if (locked) return;

            // [사용하기] 아래로 스와이프
            if (e.deltaY > 150) {
                locked = true;
                body.style.transition = 'transform 0.5s ease-in, opacity 0.3s';
                body.style.transform = 'translateY(1000px)';
                body.style.opacity = '0';
                
                setTimeout(() => {
                    // 원본 배열에서 해당 uid를 찾아 상태 변경
                    const target = allCoupons.find(c => c.uid === coupon.uid);
                    if (target) {
                        target.used = true; // 상태 변경
                        save();             // 즉시 저장
                        render();           // 다시 그리기
                    }
                }, 400);
            } 
            // [넘기기] 위로 스와이프
            else if (e.deltaY < -100) {
                locked = true;
                card.classList.add('send-to-back');
                setTimeout(() => {
                    // 순서 교체
                    const idx = allCoupons.findIndex(c => c.uid === coupon.uid);
                    const item = allCoupons.splice(idx, 1)[0];
                    allCoupons.push(item);
                    save();
                    render();
                    locked = false;
                }, 700);
            } 
            // [취소] 제자리
            else {
                body.style.transition = 'transform 0.3s ease-out';
                body.style.transform = '';
                card.style.transform = 'translateY(0) scale(1)';
            }
        });
    }

    init();
</script>
</body>
</html>
